name: Google Cloud Scheduler
description: >-
  Google Cloud Scheduler is a fully managed enterprise-grade cron job scheduler.
  It allows you to schedule virtually any job, including batch, big data jobs,
  cloud infrastructure operations, and more. Cloud Scheduler reliably sends
  requests to HTTP endpoints, Pub/Sub topics, or App Engine applications on a
  recurring schedule, with automatic retries in case of failure and configurable
  retry policies.
